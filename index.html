<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Auxílio de Mira FF - Premium Gold</title>
    <style>
        /* Fundo com degradê escuro luxuoso e bordas douradas abstratas simuladas */
        body { 
            background: #050508; 
            color: #f3e5ab; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0;
            background-image: radial-gradient(circle at 50% 50%, #121108 0%, #050508 100%);
        }

        /* Card estilo Glassmorphism Escuro com Brilho Ouro */
        .card { 
            background: rgba(10, 10, 14, 0.95); 
            padding: 2.5rem 2rem; 
            border-radius: 16px; 
            border: 1px solid #c5a059; 
            width: 390px; 
            text-align: center; 
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.25), inset 0 0 15px rgba(197, 160, 89, 0.05); 
            position: relative; 
        }
        
        /* Fotinha do usuário no canto superior direito */
        .canto-logo { 
            position: absolute; 
            top: 14px; 
            right: 14px; 
            width: 34px; 
            height: 34px; 
            border-radius: 50%; 
            border: 1px solid #c5a059; 
            object-fit: cover; 
            display: block; 
            z-index: 999; 
            box-shadow: 0 0 8px rgba(197, 160, 89, 0.4);
        }

        /* Título com Ouro Gradiente Metálico */
        h2 { 
            margin-top: 15px; 
            margin-bottom: 5px; 
            background: linear-gradient(135deg, #fff3cc 0%, #c5a059 50%, #916c2a 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            font-size: 1.6rem; 
            font-weight: 800;
        }

        p.sub { 
            color: #a39e8c; 
            font-size: 0.85rem; 
            margin-bottom: 25px; 
            letter-spacing: 0.5px;
        }

        /* Inputs Premium Escuros com borda dourada ao focar */
        input { 
            width: 92%; 
            padding: 14px; 
            margin: 10px 0; 
            border-radius: 8px; 
            border: 1px solid #4a3e25; 
            background: #09090d; 
            color: #fff3cc; 
            text-align: center; 
            font-size: 1rem; 
            outline: none;
            transition: 0.3s;
        }
        input:focus {
            border-color: #c5a059;
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
        }

        /* Botão Ouro Metálico igual ao da imagem */
        button { 
            width: 100%; 
            padding: 14px; 
            background: linear-gradient(135deg, #fed766 0%, #c5a059 50%, #916c2a 100%);
            color: #0d0d0d; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 800; 
            text-transform: uppercase; 
            margin-top: 12px; 
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.2);
            transition: 0.3s;
        }
        button:hover { 
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(197, 160, 89, 0.4);
            filter: brightness(1.1);
        }

        /* Caixas de Opções (Switches) do Painel */
        .option { 
            margin: 14px 0; 
            padding: 14px; 
            background: #0f0f14; 
            border-radius: 8px; 
            text-align: left; 
            border: 1px solid #262218; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: 0.2s;
        }
        .option:hover {
            border-color: #4a3e25;
            background: #14141c;
        }
        .option div {
            color: #e6dfcb;
            font-size: 0.95rem;
            font-weight: 500;
        }
        
        /* Chave Seletora (Switch) customizada com ativação verde neon luxuosa */
        .switch { position: relative; display: inline-block; width: 48px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { 
            position: absolute; 
            cursor: pointer; 
            top: 0; left: 0; right: 0; bottom: 0; 
            background-color: #262218; 
            border: 1px solid #4a3e25;
            transition: .3s; 
            border-radius: 24px; 
        }
        .slider:before { 
            position: absolute; 
            content: ""; 
            height: 16px; 
            width: 16px; 
            left: 3px; 
            bottom: 3px; 
            background-color: #c5a059; 
            transition: .3s; 
            border-radius: 50%; 
            box-shadow: 0 0 5px rgba(197, 160, 89, 0.5);
        }
        input:checked + .slider { 
            background-color: #0b1c14; 
            border-color: #10b981;
        } 
        input:checked + .slider:before { 
            transform: translateX(24px); 
            background-color: #10b981;
            box-shadow: 0 0 8px #10b981;
        }
        
        /* Contador de Tempo restante */
        .timer-box { 
            background: rgba(212, 175, 55, 0.05); 
            border: 1px solid #c5a059; 
            padding: 10px; 
            border-radius: 8px; 
            color: #fed766; 
            font-weight: 700; 
            margin-bottom: 20px; 
            font-family: monospace; 
            font-size: 1rem;
            letter-spacing: 0.5px;
            box-shadow: inset 0 0 10px rgba(197, 160, 89, 0.1);
        }

        #painelPrincipal { display: none; }
    </style>
</head>
<body>

<!-- TELA DE LOGIN -->
<div id="loginCard" class="card">
    <img src="73730.png" alt="Logo" class="canto-logo">
    <h2>Acesso Auxílio</h2>
    <p class="sub">Insira a Key gerada no seu painel Admin</p>
    <input type="text" id="keyInput" placeholder="XXXX-XXXX-XXXX-XXXX">
    <button onclick="verificarChave()">Entrar no Painel</button>
</div>

<!-- PAINEL DE AJUSTES COM BARRINHAS VERDES -->
<div id="painelPrincipal" class="card">
    <img src="73730.png" alt="Logo" class="canto-logo">
    <h2>Racha Sensi
    </h2>
    <p class="sub">Ative as funções de calibração</p>
    
    <div id="timerDisplay" class="timer-box">Tempo Restante: --:--</div>
    
    <div class="option">
        <div>Mira Red dot (60%)</div>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>
    
    <div class="option">
        <div>Regulagem de FOV</div>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>

    <div class="option">
        <div>Aim Lock (Prender Mira)</div>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>

    <div class="option">
        <div>Estabilidade Geral (2.5x)</div>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>

    <div class="option">
        <div>No Recoil (Reduzir Tremor)</div>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>

    <div class="option">
        <div>Suavizador de FPS</div>
        <label class="switch">
            <input type="checkbox">
            <span class="slider"></span>
        </label>
    </div>
    
    
</div>

<script>
    let intervaloCronometro;
    let tempoLimiteGlobal = 0;

    function verificarChave() {
        const inputKey = document.getElementById('keyInput').value.trim().toUpperCase();

        if (!inputKey) {
            alert('Por favor, digite uma Key!');
            return;
        }

        let bancoChaves = JSON.parse(localStorage.getItem('banco_keys_ff')) || [];
        let chaveEncontrada = bancoChaves.find(k => k.codigo.trim().toUpperCase() === inputKey);

        if (!chaveEncontrada) {
            alert('Key não encontrada ou inválida no sistema!');
            return;
        }

        let agora = Date.now();

        if (!chaveEncontrada.timestampExpiracao) {
            let minutosAdicionais = 0;
            
            if (chaveEncontrada.duracao === '1m') minutosAdicionais = 1;
            else if (chaveEncontrada.duracao === '1h') minutosAdicionais = 60;
            else if (chaveEncontrada.duracao === '1d') minutosAdicionais = 1440;
            else if (chaveEncontrada.duracao === '30d') minutosAdicionais = 43200;
            else minutosAdicionais = parseFloat(chaveChaveEncontrada ? chaveEncontrada.duracao : '1') || 1;

            chaveEncontrada.timestampExpiracao = agora + (minutosAdicionais * 60000);
            chaveEncontrada.status = 'Utilizada';
            
            localStorage.setItem('banco_keys_ff', JSON.stringify(bancoChaves));
        }

        if (agora > chaveEncontrada.timestampExpiracao) {
            alert('Esta Key já expirou!');
            return;
        }

        tempoLimiteGlobal = chaveEncontrada.timestampExpiracao;
        liberarPainel();
    }

    function liberarPainel() {
        document.getElementById('loginCard').style.display = 'none';
        document.getElementById('painelPrincipal').style.display = 'block';
        iniciarContador();
    }

    function iniciarContador() {
        if (intervaloCronometro) clearInterval(intervaloCronometro);

        intervaloCronometro = setInterval(function() {
            const agora = Date.now();
            const milissegundosRestantes = tempoLimiteGlobal - agora;

            if (milissegundosRestantes <= 0) {
                clearInterval(intervaloCronometro);
                alert('O tempo da sua Key acabou!');
                desconectar();
                return;
            }

            const totalSegundos = Math.floor(milissegundosRestantes / 1000);
            const minutos = Math.floor(totalSegundos / 60);
            const segundos = totalSegundos % 60;

            document.getElementById('timerDisplay').innerText = `Expira em: ${minutos.toString().padStart(2, '0')}:${segundos.toString().padStart(2, '0')}s`;
        }, 1000);
    }

    function desconectar() {
        if (intervaloCronometro) clearInterval(intervaloCronometro);
        tempoLimiteGlobal = 0;
        document.getElementById('keyInput').value = '';
        
        const checkboxes = document.querySelectorAll('.switch input');
        checkboxes.forEach(cb => cb.checked = false);

        document.getElementById('painelPrincipal').style.display = 'none';
        document.getElementById('loginCard').style.display = 'block';
    }
</script>
</body>
</html>
